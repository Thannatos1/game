// ============ AUDIO ============
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function initAudio() {
  if (!actx) {
    actx = new AudioCtx();
    initMusic();
  }
}

// ============ AMBIENT MUSIC ============
let musicGain = null;
let musicNodes = [];
let musicStarted = false;

function initMusic() {
  if (!actx || musicStarted) return;
  musicStarted = true;

  // Master music gain (low volume)
  musicGain = actx.createGain();
  musicGain.gain.value = 0.08;

  // Reverb-like delay for spacious feel
  const delay = actx.createDelay(2);
  delay.delayTime.value = 0.4;
  const delayGain = actx.createGain();
  delayGain.gain.value = 0.3;
  delay.connect(delayGain);
  delayGain.connect(delay);

  // Lowpass filter for warmth
  const filter = actx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 1200;
  filter.Q.value = 1;

  musicGain.connect(filter);
  filter.connect(delay);
  filter.connect(actx.destination);
  delayGain.connect(actx.destination);

  // Chord progression: Am - F - C - G (i - VI - III - VII in A minor, ethereal)
  // Frequencies for A minor chord notes
  const chords = [
    [220.00, 261.63, 329.63], // A minor (A C E)
    [174.61, 220.00, 261.63], // F major (F A C)
    [261.63, 329.63, 392.00], // C major (C E G)
    [196.00, 246.94, 293.66], // G major (G B D)
  ];

  let chordIdx = 0;

  function playChord() {
    if (!actx) return;
    const chord = chords[chordIdx];
    const now = actx.currentTime;
    const dur = 6; // 6 seconds per chord

    chord.forEach((freq, i) => {
      // Two detuned oscillators per note for richness
      [0, 7].forEach(detune => {
        const osc = actx.createOscillator();
        const g = actx.createGain();
        osc.type = i === 0 ? 'sine' : 'triangle';
        osc.frequency.value = freq;
        osc.detune.value = detune;

        // Slow envelope: fade in and out
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(0.15, now + 1.5);
        g.gain.setValueAtTime(0.15, now + dur - 1.5);
        g.gain.linearRampToValueAtTime(0, now + dur);

        osc.connect(g);
        g.connect(musicGain);
        osc.start(now);
        osc.stop(now + dur);
      });
    });

    // High shimmer note
    const shimmer = actx.createOscillator();
    const sg = actx.createGain();
    shimmer.type = 'sine';
    shimmer.frequency.value = chord[0] * 4;
    sg.gain.setValueAtTime(0, now);
    sg.gain.linearRampToValueAtTime(0.04, now + 2);
    sg.gain.linearRampToValueAtTime(0, now + dur);
    shimmer.connect(sg);
    sg.connect(musicGain);
    shimmer.start(now);
    shimmer.stop(now + dur);

    chordIdx = (chordIdx + 1) % chords.length;
    setTimeout(playChord, (dur - 0.5) * 1000); // overlap chords slightly
  }

  playChord();
}

function setMusicVolume(v) {
  if (musicGain) {
    const target = muted ? 0 : v;
    musicGain.gain.linearRampToValueAtTime(target, actx.currentTime + 0.3);
  }
}

function toggleMute() {
  muted = !muted;
  saveData();
  if (musicGain) {
    musicGain.gain.linearRampToValueAtTime(muted ? 0 : 0.12, actx.currentTime + 0.2);
  }
}

function playTone(freq, dur, type, vol, detune) {
  if (!actx || muted) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  if (detune) o.detune.value = detune;
  g.gain.setValueAtTime((vol||0.15), actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(); o.stop(actx.currentTime + dur);
}

function sndRelease() { playTone(300, 0.15, 'sine', 0.1); playTone(450, 0.1, 'triangle', 0.05); }
function sndCapture(pts, combo) {
  const base = 400 + combo * 40;
  playTone(base, 0.2, 'sine', 0.12);
  playTone(base * 1.5, 0.15, 'triangle', 0.06);
  if (pts >= 3) { setTimeout(()=>playTone(base*2, 0.2, 'sine', 0.08), 60); }
  if (pts >= 5) { setTimeout(()=>playTone(base*2.5, 0.25, 'triangle', 0.1), 120); }
}
function sndDie() {
  playTone(200, 0.4, 'sawtooth', 0.1);
  playTone(120, 0.6, 'sine', 0.08);
}
function sndPhase() {
  playTone(600, 0.15, 'sine', 0.1);
  setTimeout(()=>playTone(800, 0.15, 'sine', 0.1), 100);
  setTimeout(()=>playTone(1000, 0.2, 'triangle', 0.08), 200);
}
function sndRecord() {
  [0,100,200,300].forEach((d,i)=>setTimeout(()=>playTone(500+i*150,0.2,'sine',0.1),d));
}

function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2)}
function rand(a,b){return a+Math.random()*(b-a)}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function lerpColor(a,b,t){
  const ah=parseInt(a.slice(1),16),bh=parseInt(b.slice(1),16);
  const ar=(ah>>16)&255,ag=(ah>>8)&255,ab=ah&255;
  const br=(bh>>16)&255,bg=(bh>>8)&255,bb=bh&255;
  const r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bl=Math.round(ab+(bb-ab)*t);
  return `rgb(${r},${g},${bl})`;
}

// ============ NODE GENERATION ============
function isTooClose(x,y,minDist){
  for(let i=Math.max(0,nodes.length-8);i<nodes.length;i++){
    if(dist(x,y,nodes[i].x,nodes[i].y)<minDist)return true;
  }
  return false;
}

function placeBranch(fromNode, tier, angleOffset) {
  const t = TIERS[tier];
  const baseDist = 220 + Math.min(score*2, 100);
  const baseAngle = -Math.PI/2 + angleOffset;

  let nx, ny, attempts=0, distance;
  do {
    // More random distance variation per attempt
    distance = baseDist * t.distMul + rand(-40, 40);
    const angle = baseAngle + rand(-0.25, 0.25);
    nx = fromNode.x + Math.cos(angle) * distance;
    ny = fromNode.y + Math.sin(angle) * distance;
    attempts++;
  } while(attempts<25 && isTooClose(nx,ny,150));

  const phase = getPhase();
  const isMoving = !zenMode && phase>=5 && tier!=='easy' && Math.random()<0.4;
  const isDisappearing = !zenMode && phase>=5 && tier==='hard' && Math.random()<0.3;
  const isTeleporting = !zenMode && phase>=6 && tier!=='easy' && Math.random()<0.5;

  return {
    x:nx, y:ny, baseX:nx, baseY:ny,
    tier, pts:t.pts, label:t.label,
    colorIdx: tier,
    nodeR: NODE_R * t.sizeMul,
    captureR: getCaptureR(tier),
    pulse: rand(0,Math.PI*2),
    captured:false, passed:false,
    moving:isMoving,
    mSpeed:isMoving?rand(1.2,2.5):0,
    mAngle:rand(0,Math.PI*2),
    mRadius:isMoving?rand(15,30):0,
    disappearing:isDisappearing,
    disappearTimer:isDisappearing?rand(2.5,4):0,
    visible:true,
    teleporting:isTeleporting,
    teleportTimer:isTeleporting?rand(2,4):0,
    teleportFlash:0,
    branchGroup:-1,
  };
}

function spawnBranches(fromNode, groupId) {
  const phase = getPhase();
  const branches = [];

  if (phase <= 1) {
    // Phase 1: 2 nodes well separated
    branches.push(placeBranch(fromNode, 'easy', rand(-0.9,-0.5)));
    branches.push(placeBranch(fromNode, 'medium', rand(0.5,0.9)));
  } else if (phase <= 2) {
    // Phase 2: 2-3 choices
    branches.push(placeBranch(fromNode, 'easy', rand(-1.0,-0.5)));
    branches.push(placeBranch(fromNode, 'medium', rand(0.5,1.0)));
    if (Math.random()<0.3) branches.push(placeBranch(fromNode, 'hard', rand(-0.25,0.25)));
  } else if (phase <= 3) {
    // Phase 3: 3 choices in distinct directions
    branches.push(placeBranch(fromNode, 'easy', rand(-1.1,-0.6)));
    branches.push(placeBranch(fromNode, 'medium', rand(-0.25,0.25)));
    branches.push(placeBranch(fromNode, 'hard', rand(0.6,1.1)));
  } else {
    // Phase 4-5: 3 choices with possible gold
    branches.push(placeBranch(fromNode, 'easy', rand(-1.1,-0.6)));
    branches.push(placeBranch(fromNode, 'hard', rand(0.6,1.1)));
    if (Math.random()<0.25) {
      branches.push(placeBranch(fromNode, 'gold', rand(-0.25,0.25)));
    } else {
      branches.push(placeBranch(fromNode, 'medium', rand(-0.25,0.25)));
    }
  }

  // Spawn asteroids for phase 4+ (not in zen)
  if (phase >= 4 && !zenMode) {
    for (const b of branches) {
      if (b.tier !== 'easy' && Math.random()<0.5) {
        const mx = (fromNode.x+b.x)/2, my = (fromNode.y+b.y)/2;
        const na = 1+Math.floor(Math.random()*2);
        for(let i=0;i<na;i++){
          asteroids.push({
            x:mx+rand(-50,50), y:my+rand(-50,50),
            r:rand(8,16), rot:rand(0,Math.PI*2), rotSpd:rand(-2,2),
            vertices:genAsteroidShape()
          });
        }
      }
    }
  }

  branches.forEach(b=>{ b.branchGroup=groupId; nodes.push(b); });
}

function genAsteroidShape(){
  const pts=[];const n=6+Math.floor(Math.random()*4);
  for(let i=0;i<n;i++){pts.push({a:(i/n)*Math.PI*2,r:0.6+Math.random()*0.4})}
  return pts;
}

function initNodes(){
  nodes=[]; asteroids=[];
  // Starting node
  nodes.push({
    x:W/2,y:H/2,baseX:W/2,baseY:H/2,tier:'medium',pts:0,label:'',
    colorIdx:'medium',nodeR:NODE_R,captureR:55,pulse:0,
    captured:true,passed:true,moving:false,mSpeed:0,mAngle:0,mRadius:0,
    disappearing:false,disappearTimer:0,visible:true,branchGroup:-1
  });
  spawnBranches(nodes[0], 0);
}

// ============ RESET ============
function reset(){
  score=0;newRec=false;deathT=0;shakeT=0;flashA=0;
  phaseMsg='';phaseMsgT=0;combo=0;maxCombo=0;comboTimer=0;lastCaptureTime=0;
  particles=[];ringParticles=[];scorePopups=[];
  // Reset powerups
  powerups=[];
  activeShield=false;
  slowMoTimer=0;
  magnetTimer=0;
  powerupSpawnTimer=8; // First powerup after 8 seconds
  // Tutorial only for first 3 games
  tutorialStep = totalGames < 3 ? 1 : 0;
  tutorialT = 0;
  initNodes();
  ball.currentNode=0;ball.orbiting=true;ball.angle=0;
  ball.orbitRadius=44;ball.orbitDir=1;
  ball.vx=0;ball.vy=0;ball.trail=[];ball.glow=0;ball.squash=1;ball.speed=0;
  const n=nodes[0];
  ball.x=n.x+Math.cos(ball.angle)*ball.orbitRadius;
  ball.y=n.y+Math.sin(ball.angle)*ball.orbitRadius;
  cam.x=n.x-W/2;cam.y=n.y-H/2;cam.tx=cam.x;cam.ty=cam.y;
  cam.zoom=1;cam.tz=1;
}

// ============ GAME LOGIC ============
function release(){
  if(!ball.orbiting)return;
  if(tutorialStep===1)tutorialStep=2;
  const tang=ball.angle+(ball.orbitDir*Math.PI/2);
  const speed=getOrbitSpeed()*ball.orbitRadius*2.2;
  ball.vx=Math.cos(tang)*speed;
  ball.vy=Math.sin(tang)*speed;
  ball.orbiting=false;
  ball.squash=0.8;
  cam.tz=0.85; // zoom out while flying
  sndRelease();
  emit(ball.x,ball.y,6,['#ffffff','#aaaaff'],0.6);
}

function capture(nodeIdx){
  const prevPhase=getPhase();
  const n=nodes[nodeIdx];
  ball.currentNode=nodeIdx;
  ball.orbiting=true;
  n.captured=true;
  cam.tz=1; // zoom back in

  // Tutorial progression
  if(tutorialStep===2)tutorialStep=3;
  else if(tutorialStep===3&&score>=2)tutorialStep=4;
  else if(tutorialStep===4&&score>=4)tutorialStep=0;

  ball.angle=Math.atan2(ball.y-n.y,ball.x-n.x);
  ball.orbitRadius=dist(ball.x,ball.y,n.x,n.y);
  ball.orbitRadius=clamp(ball.orbitRadius,ORBIT_R_MIN,ORBIT_R_MAX);
  ball.orbitDir=Math.random()<0.5?1:-1;
  ball.squash=1.3;

  // Combo
  const now=performance.now()/1000;
  if(now-lastCaptureTime<2.5&&lastCaptureTime>0){
    combo++;
    if(combo>maxCombo)maxCombo=combo;
  } else { combo=1; }
  lastCaptureTime=now;
  comboTimer=2;

  // Score
  const pts=n.pts||1;
  const comboMul=combo>=5?2:(combo>=3?1.5:1);
  const gained=Math.ceil(pts*comboMul);
  score+=gained;

  // Effects
  const tc=TIERS[n.tier]||TIERS.medium;
  const col=tc.color;
  const intensity=pts>=3?1.2:(pts>=5?1.5:0.8);
  emit(n.x,n.y,8+pts*3,[col.main,col.light,'#ffffff'],intensity);
  emitRing(n.x,n.y,col.main);

  // Score popup
  let popText='+'+gained;
  if(comboMul>1)popText+=' x'+comboMul;
  addScorePopup(n.x,n.y-30,popText,col.light);

  // Combo popup
  if(combo>=3){
    addScorePopup(n.x,n.y-55,'COMBO '+combo+'!',combo>=5?'#ffd32a':'#00f5d4');
  }

  sndCapture(pts,combo);
  if(navigator.vibrate){
    if(pts>=5)navigator.vibrate([60,30,60,30,80]);
    else if(pts>=3)navigator.vibrate([30,15,30]);
    else navigator.vibrate(10);
  }

  // Epic gold node animation
  if(n.tier==='gold'){
    totalGoldCaptured++;
    goldFlashT=1.0;
    goldZoomT=1.0;
    shakeT=0.4;
    shakeA=8;
    // Burst of extra particles
    for(let i=0;i<3;i++){
      setTimeout(()=>{
        emit(n.x,n.y,15,['#ffd32a','#ffe066','#ffffff','#ffaa00'],1.8);
        emitRing(n.x,n.y,'#ffd32a');
      },i*80);
    }
    // Special chime
    if(actx&&!muted){
      [0,150,300].forEach((d,i)=>{
        setTimeout(()=>{
          playTone(800+i*200,0.4,'sine',0.15);
          playTone(1200+i*300,0.3,'triangle',0.08);
        },d);
      });
    }
  }

  // Track stats
  totalNodesEver++;
  if(combo>bestComboEver)bestComboEver=combo;

  // Remove sibling branches (same group, not captured)
  const grp=n.branchGroup;
  if(grp>=0){
    for(let i=nodes.length-1;i>=0;i--){
      if(nodes[i].branchGroup===grp&&!nodes[i].captured&&i!==nodeIdx){
        // Fade out effect
        emit(nodes[i].x,nodes[i].y,4,['#555','#888'],0.3);
        nodes.splice(i,1);
        if(i<ball.currentNode)ball.currentNode--;
      }
    }
  }

  // Phase check
  const newPhase=getPhase();
  if(newPhase>prevPhase&&PHASE_NAMES[newPhase]){
    phaseMsg=PHASE_NAMES[newPhase];phaseMsgT=2.5;sndPhase();
    if(navigator.vibrate)navigator.vibrate([40,30,40,30,40]);
  }

  // Spawn new branches
  spawnBranches(n, (grp>=0?grp:0)+1);
  ensureStars(n.x,n.y);
}

function ensureStars(cx,cy){
  for(let i=stars.length-1;i>=0;i--){
    if(dist(stars[i].x,stars[i].y,cx,cy)>W*2.5)stars.splice(i,1);
  }
  while(stars.length<120){
    stars.push({x:cx+rand(-W*1.5,W*1.5),y:cy+rand(-H*1.5,H*1.5),
      size:rand(0.5,2),alpha:rand(0.1,0.5),twinkle:rand(1,4),phase:rand(0,Math.PI*2)});
  }
}

function die(){
  if(state!==ST.PLAY)return;

  // Shield protects from death
  if(activeShield){
    activeShield=false;
    flashA=0.5;
    shakeT=0.2;
    shakeA=8;
    emit(ball.x,ball.y,20,['#00ffff','#ffffff','#80ffff'],1.2);
    if(navigator.vibrate)navigator.vibrate([30,20,30]);
    if(actx&&!muted){
      playTone(800,0.2,'sine',0.15);
      setTimeout(()=>playTone(1000,0.2,'sine',0.1),100);
    }
    // Bounce back toward last captured node
    const cn=nodes[ball.currentNode];
    if(cn){
      const dx=cn.x-ball.x,dy=cn.y-ball.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>0){
        ball.vx=dx/d*200;
        ball.vy=dy/d*200;
      }
    }
    return;
  }

  state=ST.DEAD;deathT=0;flashA=0.4;shakeT=0.35;shakeA=12;
  if(score>best){
    best=score;newRec=true;sndRecord();
    // Submit to global ranking if we have a name and score is meaningful
    if(playerName && score>=5 && score>lastSubmittedScore){
      lastSubmittedScore = score;
      submitScore(playerName, score, selectedSkin);
    }
  }
  else sndDie();
  // Track stats
  totalScoreEver+=score;
  const finalPhase=getPhase();
  if(finalPhase>highestPhase)highestPhase=finalPhase;
  emit(ball.x,ball.y,30,['#ff6b6b','#ffa502','#e056fd','#70a1ff','#ffffff'],1.5);
  if(navigator.vibrate)navigator.vibrate(newRec?[80,40,80]:50);
  totalGames++;
  pendingUnlocks = checkUnlocks();
  pendingAchievements = checkAchievements();
  pendingUnlocks = pendingUnlocks.concat(pendingAchievements);
  saveData();
  setMusicVolume(0.05);
}

function spawnPowerup(){
  // Pick a position ahead of the current node
  const cn=nodes[ball.currentNode];
  if(!cn)return;
  // Find next uncaptured node to spawn between
  let target=null;
  for(let i=ball.currentNode+1;i<nodes.length;i++){
    if(!nodes[i].captured){target=nodes[i];break;}
  }
  if(!target)return;

  const mx=(cn.x+target.x)/2+rand(-50,50);
  const my=(cn.y+target.y)/2+rand(-50,50);

  const types=['shield','slowmo','magnet'];
  const type=types[Math.floor(Math.random()*types.length)];

  powerups.push({
    x:mx, y:my, type, life:12,
    pulse:rand(0,Math.PI*2), bobY:0,
    spawnT:0,
  });
}

function collectPowerup(p){
  if(p.type==='shield'){
    activeShield=true;
    emit(p.x,p.y,15,['#00ffff','#80ffff','#ffffff'],1);
  } else if(p.type==='slowmo'){
    slowMoTimer=3;
    emit(p.x,p.y,15,['#c084fc','#ff80ff','#ffffff'],1);
  } else if(p.type==='magnet'){
    magnetTimer=4;
    emit(p.x,p.y,15,['#ffd32a','#ffaa00','#ffffff'],1);
  }
  if(actx&&!muted){
    playTone(600,0.15,'sine',0.15);
    setTimeout(()=>playTone(900,0.15,'triangle',0.1),80);
    setTimeout(()=>playTone(1200,0.2,'sine',0.08),160);
  }
  if(navigator.vibrate)navigator.vibrate([20,15,20]);
}

// Pause button area (top right corner)
const PAUSE_BTN = { size: 44, margin: 16 };
const MUTE_BTN = { size: 44, margin: 16 };

function isPauseBtnTap(x, y) {
  const bx = W - PAUSE_BTN.margin - PAUSE_BTN.size;
  const by = PAUSE_BTN.margin;
  return x >= bx && x <= bx + PAUSE_BTN.size && y >= by && y <= by + PAUSE_BTN.size;
}

function isMuteBtnTap(x, y) {
  const bx = W - MUTE_BTN.margin - PAUSE_BTN.size - 8 - MUTE_BTN.size;
  const by = MUTE_BTN.margin;
  return x >= bx && x <= bx + MUTE_BTN.size && y >= by && y <= by + MUTE_BTN.size;
}

// Menu button areas
let menuBtnAreas = [];

function handleTap(x, y){
  initAudio();

  // Mute button works in any state
  if((state===ST.PLAY||state===ST.PAUSE||state===ST.MENU||state===ST.DEAD) && isMuteBtnTap(x, y)){
    toggleMute();
    return;
  }

  // Check pause button tap during play
  if(state===ST.PLAY && isPauseBtnTap(x, y)){
    state=ST.PAUSE;
    setMusicVolume(0.05);
    return;
  }

  // Pause and Dead screens use buttons
  if(state===ST.PAUSE || state===ST.DEAD){
    for(const b of menuBtnAreas){
      if(x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h){
        b.action();
        return;
      }
    }
    return;
  }

  // Menu screens
  if(state===ST.MENU){
    for(const b of menuBtnAreas){
      if(x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h){
        b.action();
        return;
      }
    }
    return;
  }

  // Playing - tap anywhere releases
  if(state===ST.PLAY){release();}
}

function handleInput(){
  // Backwards compat for keyboard - only works during play
  if(state===ST.PLAY)release();
  else if(state===ST.MENU&&menuScreen==='main'){reset();state=ST.PLAY;totalGames++;setMusicVolume(0.12);}
  else if(state===ST.DEAD&&deathT>0.6){reset();state=ST.PLAY;totalGames++;setMusicVolume(0.12);}
}

C.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  const rect=C.getBoundingClientRect();
  handleTap(t.clientX-rect.left, t.clientY-rect.top);
});
C.addEventListener('mousedown',e=>{
  const rect=C.getBoundingClientRect();
  handleTap(e.clientX-rect.left, e.clientY-rect.top);
});
document.addEventListener('keydown',e=>{
  if(nameInputActive){
    e.preventDefault();
    if(e.key==='Backspace'){
      nameInputBuffer=nameInputBuffer.slice(0,-1);
    } else if(e.key==='Enter'){
      if(nameInputBuffer.trim().length>=2){
        playerName=nameInputBuffer.trim().substring(0,16);
        nameInputActive=false;
        nameInputBuffer='';
        saveData();
        if(best>=5){
          lastSubmittedScore=best;
          submitScore(playerName,best,selectedSkin);
        }
        menuScreen='ranking';
        loadRankings();
      }
    } else if(e.key==='Escape'){
      nameInputActive=false;
      nameInputBuffer='';
    } else if(e.key.length===1 && nameInputBuffer.length<16){
      nameInputBuffer+=e.key.toUpperCase();
    }
    return;
  }
  if(e.code==='Space'){e.preventDefault();handleInput();}
});

// Pause on visibility change
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&state===ST.PLAY){
    state=ST.PAUSE;
    setMusicVolume(0.05);
  }
});

// ============ UPDATE ============
function update(dt){
  menuT+=dt;
  if(tutorialStep>0)tutorialT+=dt;
  if(shakeT>0)shakeT-=dt;
  if(flashA>0)flashA-=dt*2.5;
  if(phaseMsgT>0)phaseMsgT-=dt;
  if(goldFlashT>0)goldFlashT-=dt*1.5;
  if(goldZoomT>0)goldZoomT-=dt*1.2;
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)combo=0;}

  // Nodes
  for(const n of nodes){
    n.pulse+=dt*2;
    if(n.moving&&!n.captured){
      n.mAngle+=n.mSpeed*dt;
      n.x=n.baseX+Math.cos(n.mAngle)*n.mRadius;
      n.y=n.baseY+Math.sin(n.mAngle)*n.mRadius;
    }
    if(n.disappearing&&!n.captured){
      n.disappearTimer-=dt;
      if(n.disappearTimer<=0){
        n.visible=!n.visible;
        n.disappearTimer=n.visible?rand(2,4):rand(0.8,1.5);
      }
    }
    if(n.teleporting&&!n.captured){
      if(n.teleportFlash>0)n.teleportFlash-=dt*3;
      n.teleportTimer-=dt;
      if(n.teleportTimer<=0){
        // Emit particles at old position
        const tc=TIERS[n.tier]||TIERS.medium;
        emit(n.x,n.y,8,[tc.color.main,'#ffffff'],0.7);
        // Teleport to new random nearby position
        const angle=rand(0,Math.PI*2);
        const teleDist=rand(60,150);
        n.baseX=n.x+Math.cos(angle)*teleDist;
        n.baseY=n.y+Math.sin(angle)*teleDist;
        n.x=n.baseX;
        n.y=n.baseY;
        n.teleportFlash=1;
        n.teleportTimer=rand(2,4);
        emit(n.x,n.y,8,[tc.color.main,'#ffffff'],0.7);
      }
    }
  }

  // Asteroids
  for(const a of asteroids)a.rot+=a.rotSpd*dt;

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.98;p.vy*=0.98;
    p.life-=p.decay*dt;if(p.life<=0)particles.splice(i,1);
  }
  for(let i=ringParticles.length-1;i>=0;i--){
    const r=ringParticles[i];r.r+=(r.maxR-r.r)*4*dt;r.life-=2*dt;
    if(r.life<=0)ringParticles.splice(i,1);
  }
  for(let i=scorePopups.length-1;i>=0;i--){
    const p=scorePopups[i];p.y+=p.vy*dt;p.vy*=0.95;p.life-=dt;
    if(p.life<=0)scorePopups.splice(i,1);
  }

  if(state===ST.DEAD){deathT+=dt;return;}
  if(state===ST.PAUSE)return;
  if(state!==ST.PLAY)return;

  ball.glow+=dt*3;
  ball.squash+=(1-ball.squash)*8*dt;

  // Power-up timers
  if(slowMoTimer>0)slowMoTimer-=dt;
  if(magnetTimer>0)magnetTimer-=dt;

  // Power-up spawning - only after score 15, rare
  if(!zenMode && score>=15){
    powerupSpawnTimer-=dt;
    if(powerupSpawnTimer<=0 && powerups.length<2){
      spawnPowerup();
      powerupSpawnTimer=15+Math.random()*15; // Every 15-30s
    }
  }

  // Update existing powerups
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    p.pulse+=dt*3;
    p.life-=dt;
    p.bobY=Math.sin(menuT*2+p.pulse)*4;

    // Collision with ball
    const d=dist(ball.x,ball.y+p.bobY*0,p.x,p.y);
    if(d<25){
      collectPowerup(p);
      powerups.splice(i,1);
      continue;
    }

    if(p.life<=0)powerups.splice(i,1);
  }

  if(ball.orbiting){
    const n=nodes[ball.currentNode];
    ball.angle+=ball.orbitDir*getOrbitSpeed()*dt;
    ball.x=n.x+Math.cos(ball.angle)*ball.orbitRadius;
    ball.y=n.y+Math.sin(ball.angle)*ball.orbitRadius;
    ball.speed=0;
    ball.trail.push({x:ball.x,y:ball.y,a:1});
    if(ball.trail.length>20)ball.trail.shift();
  } else {
    // Apply slow-mo to dt for ball physics
    const physDt = slowMoTimer>0 ? dt*0.4 : dt;

    // Gravity (boosted by magnet)
    let grav=getGravityStrength();
    if(magnetTimer>0)grav=Math.max(grav,150);
    if(grav>0){
      let closest=null,closestD=Infinity;
      for(let i=0;i<nodes.length;i++){
        if(nodes[i].captured||!nodes[i].visible)continue;
        const d=dist(ball.x,ball.y,nodes[i].x,nodes[i].y);
        if(d<closestD){closestD=d;closest=nodes[i];}
      }
      if(closest&&closestD>10){
        const dx=closest.x-ball.x,dy=closest.y-ball.y;
        const f=grav/closestD;
        ball.vx+=dx/closestD*f*physDt;
        ball.vy+=dy/closestD*f*physDt;
      }
    }

    ball.x+=ball.vx*physDt;ball.y+=ball.vy*physDt;
    ball.speed=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
    ball.trail.push({x:ball.x,y:ball.y,a:1});
    if(ball.trail.length>25)ball.trail.shift();

    // Capture check
    let captured=false;
    for(let i=0;i<nodes.length;i++){
      const n=nodes[i];
      if(n.captured||!n.visible)continue;
      if(dist(ball.x,ball.y,n.x,n.y)<n.captureR){
        capture(i);captured=true;break;
      }
    }

    // Asteroid collision
    if(!captured){
      for(const a of asteroids){
        if(dist(ball.x,ball.y,a.x,a.y)<a.r+BALL_R-3){
          emit(ball.x,ball.y,12,['#888','#aaa','#ff6b6b'],1);die();return;
        }
      }
    }

    // Death: missed all targets
    if(!captured){
      let anyReachable=false;
      for(let i=0;i<nodes.length;i++){
        const n=nodes[i];
        if(n.captured||!n.visible)continue;
        const cn=nodes[ball.currentNode];
        const dOrigin=dist(cn.x,cn.y,n.x,n.y);
        const dBall=dist(ball.x,ball.y,n.x,n.y);
        if(dBall<dOrigin+(zenMode?500:200)){anyReachable=true;break;}
      }
      if(!anyReachable){die();return;}
    }
  }

  // Trail fade
  for(const t of ball.trail)t.a-=3.5*dt;
  ball.trail=ball.trail.filter(t=>t.a>0);

  // Camera
  if(ball.orbiting){
    cam.tx=nodes[ball.currentNode].x-W/2;
    cam.ty=nodes[ball.currentNode].y-H/2;
  } else {
    cam.tx=ball.x-W/2;cam.ty=ball.y-H/2;
  }
  cam.x+=(cam.tx-cam.x)*4*dt;
  cam.y+=(cam.ty-cam.y)*4*dt;
  cam.zoom+=(cam.tz-cam.zoom)*5*dt;

  // Cleanup
  for(let i=nodes.length-1;i>=0;i--){
    const n=nodes[i];
    if(n.captured&&dist(n.x,n.y,ball.x,ball.y)>W*2){
      nodes.splice(i,1);
      if(i<=ball.currentNode)ball.currentNode--;
    }
  }
  for(let i=asteroids.length-1;i>=0;i--){
    if(dist(asteroids[i].x,asteroids[i].y,ball.x,ball.y)>W*2)asteroids.splice(i,1);
  }
}

// ============ DRAW ============
function drawBackground(){
  const bg=BACKGROUNDS[selectedBg]||BACKGROUNDS.space;
  const t=menuT;

  if(bg.type==='stars'){
    // Default space - just dark
    const bgc=getBgColors();
    const grad=X.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,bgc.top);grad.addColorStop(0.5,bgc.mid);grad.addColorStop(1,bgc.bot);
    X.fillStyle=grad;X.fillRect(-10,-10,W+20,H+20);
  }
  else if(bg.type==='nebula'){
    // Nebula - colorful clouds
    X.fillStyle='#0a0518';X.fillRect(-10,-10,W+20,H+20);
    // Nebula clouds
    const clouds=[
      {x:W*0.3,y:H*0.3,r:W*0.5,c1:'rgba(150,50,200,0.3)',c2:'rgba(150,50,200,0)'},
      {x:W*0.7,y:H*0.6,r:W*0.45,c1:'rgba(50,100,200,0.25)',c2:'rgba(50,100,200,0)'},
      {x:W*0.5,y:H*0.5,r:W*0.4,c1:'rgba(200,50,100,0.2)',c2:'rgba(200,50,100,0)'},
    ];
    for(const c of clouds){
      const g=X.createRadialGradient(c.x+Math.sin(t*0.3)*30,c.y+Math.cos(t*0.2)*20,0,c.x,c.y,c.r);
      g.addColorStop(0,c.c1);g.addColorStop(1,c.c2);
      X.fillStyle=g;X.fillRect(-10,-10,W+20,H+20);
    }
  }
  else if(bg.type==='galaxy'){
    // Galaxy with spiral
    X.fillStyle='#040418';X.fillRect(-10,-10,W+20,H+20);
    const cx=W/2,cy=H/2;
    // Spiral arms
    for(let i=0;i<3;i++){
      const armAngle=t*0.05+i*Math.PI*2/3;
      for(let j=0;j<60;j++){
        const dist=j*8;
        const angle=armAngle+j*0.15;
        const x=cx+Math.cos(angle)*dist;
        const y=cy+Math.sin(angle)*dist*0.6;
        X.globalAlpha=0.3-j*0.004;
        X.fillStyle=j<20?'#fff080':(j<40?'#ff80c0':'#a080ff');
        X.beginPath();X.arc(x,y,3-j*0.03,0,Math.PI*2);X.fill();
      }
    }
    // Core glow
    const cg=X.createRadialGradient(cx,cy,0,cx,cy,80);
    cg.addColorStop(0,'rgba(255,240,180,0.6)');
    cg.addColorStop(1,'rgba(255,240,180,0)');
    X.fillStyle=cg;X.fillRect(-10,-10,W+20,H+20);
    X.globalAlpha=1;
  }
  else if(bg.type==='blackhole'){
    // Black hole with accretion disk
    X.fillStyle='#000005';X.fillRect(-10,-10,W+20,H+20);
    const cx=W/2,cy=H/2;
    // Accretion disk
    for(let i=0;i<40;i++){
      const a=t*0.5+i*0.157;
      const r1=80+i*3;
      X.globalAlpha=0.4-i*0.008;
      const hue=20+i*5;
      X.fillStyle=`hsl(${hue},90%,60%)`;
      X.beginPath();
      X.ellipse(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1*0.3,2,2,0,0,Math.PI*2);
      X.fill();
    }
    X.globalAlpha=1;
    // Event horizon
    X.fillStyle='#000';
    X.shadowColor='#ff8000';X.shadowBlur=40;
    X.beginPath();X.arc(cx,cy,50,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
    // Light ring
    X.strokeStyle='rgba(255,180,80,0.6)';X.lineWidth=3;
    X.beginPath();X.arc(cx,cy,55,0,Math.PI*2);X.stroke();
  }
  else if(bg.type==='redgiant'){
    // Red giant star
    X.fillStyle='#1a0008';X.fillRect(-10,-10,W+20,H+20);
    const cx=W*0.7,cy=H*0.3;
    // Atmosphere
    const ag=X.createRadialGradient(cx,cy,0,cx,cy,W*0.6);
    ag.addColorStop(0,'rgba(255,80,40,0.5)');
    ag.addColorStop(0.3,'rgba(200,40,20,0.3)');
    ag.addColorStop(1,'rgba(100,0,0,0)');
    X.fillStyle=ag;X.fillRect(-10,-10,W+20,H+20);
    // Star core
    X.shadowColor='#ff4000';X.shadowBlur=60;
    const sg=X.createRadialGradient(cx,cy,0,cx,cy,120);
    sg.addColorStop(0,'#ffff80');
    sg.addColorStop(0.4,'#ff8000');
    sg.addColorStop(1,'#cc2200');
    X.fillStyle=sg;
    X.beginPath();X.arc(cx,cy,120+Math.sin(t)*5,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
    // Solar flares
    for(let i=0;i<6;i++){
      const fa=t*0.5+i*Math.PI/3;
      X.fillStyle='rgba(255,150,50,0.4)';
      X.beginPath();
      X.moveTo(cx+Math.cos(fa)*120,cy+Math.sin(fa)*120);
      X.lineTo(cx+Math.cos(fa)*(150+Math.sin(t*2+i)*15),cy+Math.sin(fa)*(150+Math.sin(t*2+i)*15));
      X.lineTo(cx+Math.cos(fa+0.1)*120,cy+Math.sin(fa+0.1)*120);
      X.closePath();X.fill();
    }
  }
  else if(bg.type==='cosmic'){
    // Cosmic - everything
    X.fillStyle='#02020a';X.fillRect(-10,-10,W+20,H+20);
    // Nebula
    const ng=X.createRadialGradient(W*0.3,H*0.4,0,W*0.3,H*0.4,W*0.6);
    ng.addColorStop(0,'rgba(100,50,200,0.4)');
    ng.addColorStop(1,'rgba(100,50,200,0)');
    X.fillStyle=ng;X.fillRect(-10,-10,W+20,H+20);
    const ng2=X.createRadialGradient(W*0.7,H*0.6,0,W*0.7,H*0.6,W*0.5);
    ng2.addColorStop(0,'rgba(0,150,200,0.3)');
    ng2.addColorStop(1,'rgba(0,150,200,0)');
    X.fillStyle=ng2;X.fillRect(-10,-10,W+20,H+20);
    // Distant galaxy
    const cx=W*0.2,cy=H*0.7;
    for(let i=0;i<25;i++){
      const a=t*0.05+i*0.25;
      const d=i*4;
      X.globalAlpha=0.4-i*0.012;
      X.fillStyle=i<10?'#fff':'#80a0ff';
      X.beginPath();X.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d*0.6,2,0,Math.PI*2);X.fill();
    }
    X.globalAlpha=1;
    // Bright stars
    for(let i=0;i<8;i++){
      const sx=(i*97)%W;
      const sy=(i*131)%H;
      const tw=0.5+0.5*Math.sin(t*2+i);
      X.globalAlpha=tw;
      X.fillStyle='#fff';
      X.beginPath();X.arc(sx,sy,2,0,Math.PI*2);X.fill();
      // Cross flare
      X.strokeStyle='rgba(255,255,255,0.5)';
      X.lineWidth=1;
      X.beginPath();
      X.moveTo(sx-6,sy);X.lineTo(sx+6,sy);
      X.moveTo(sx,sy-6);X.lineTo(sx,sy+6);
      X.stroke();
    }
    X.globalAlpha=1;
  }
}

function draw(){
  X.save();
  if(shakeT>0)X.translate((Math.random()-0.5)*shakeA,(Math.random()-0.5)*shakeA);

  // Draw background variant
  drawBackground();

  // Camera zoom (with gold zoom boost)
  let z=cam.zoom;
  if(goldZoomT>0){
    z += Math.sin(goldZoomT*Math.PI) * 0.15;
  }
  if(z!==1){
    X.translate(W/2,H/2);X.scale(z,z);X.translate(-W/2,-H/2);
  }

  // Stars / speed lines
  const isFlying=!ball.orbiting&&state===ST.PLAY;
  const speedRatio=clamp(ball.speed/500,0,1);

  for(const s of stars){
    const sx=s.x-cam.x,sy=s.y-cam.y;
    if(sx<-30||sx>W+30||sy<-30||sy>H+30)continue;
    const tw=s.alpha*(0.6+0.4*Math.sin(menuT*s.twinkle+s.phase));
    X.globalAlpha=tw;

    if(isFlying&&speedRatio>0.3){
      // Speed lines
      const lineLen=s.size*3*speedRatio*8;
      const angle=Math.atan2(ball.vy,ball.vx);
      X.strokeStyle=speedRatio>0.6?'#8080ff':'#d4c5ff';
      X.lineWidth=s.size*0.8;
      X.beginPath();
      X.moveTo(sx,sy);
      X.lineTo(sx-Math.cos(angle)*lineLen,sy-Math.sin(angle)*lineLen);
      X.stroke();
    } else {
      X.fillStyle='#d4c5ff';
      X.beginPath();X.arc(sx,sy,s.size,0,Math.PI*2);X.fill();
    }
  }
  X.globalAlpha=1;

  // Ring particles
  for(const r of ringParticles){
    X.globalAlpha=r.life*0.5;X.strokeStyle=r.color;X.lineWidth=2;
    X.beginPath();X.arc(r.x-cam.x,r.y-cam.y,r.r,0,Math.PI*2);X.stroke();
  }
  X.globalAlpha=1;

  // Only render game world when playing, paused or dead
  if(state!==ST.MENU){

  // Connection lines
  for(let i=0;i<nodes.length;i++){
    const n=nodes[i];
    if(n.captured||n.branchGroup<0)continue;
    // Find parent (last captured node before this branch group)
    let parent=null;
    for(let j=i-1;j>=0;j--){
      if(nodes[j].captured){parent=nodes[j];break;}
    }
    if(!parent)continue;
    const ax=parent.x-cam.x,ay=parent.y-cam.y;
    const bx=n.x-cam.x,by=n.y-cam.y;
    if(!n.visible){X.globalAlpha=0.03;}else{X.globalAlpha=0.1;}

    const tc=TIERS[n.tier]||TIERS.medium;
    X.strokeStyle=tc.color.main;
    X.lineWidth=1;X.setLineDash([4,8]);
    X.beginPath();X.moveTo(ax,ay);X.lineTo(bx,by);X.stroke();
    X.setLineDash([]);
  }
  X.globalAlpha=1;

  // Asteroids
  for(const a of asteroids){
    const ax=a.x-cam.x,ay=a.y-cam.y;
    if(ax<-60||ax>W+60||ay<-60||ay>H+60)continue;
    drawAsteroid(a,ax,ay);
  }

  // Nodes
  for(let i=0;i<nodes.length;i++){
    const n=nodes[i];
    const nx=n.x-cam.x,ny=n.y-cam.y;
    if(nx<-100||nx>W+100||ny<-100||ny>H+100)continue;
    if(!n.visible&&!n.captured){
      // Ghost
      X.globalAlpha=0.08+Math.sin(n.pulse*3)*0.04;
      const tc=TIERS[n.tier]||TIERS.medium;
      X.strokeStyle=tc.color.main;X.lineWidth=1;X.setLineDash([2,4]);
      X.beginPath();X.arc(nx,ny,n.nodeR+2,0,Math.PI*2);X.stroke();
      X.setLineDash([]);X.globalAlpha=1;
      continue;
    }
    drawNode(n,nx,ny,i);
  }

  // Trajectory prediction line - shows where ball will fly if released now
  if(state===ST.PLAY&&ball.orbiting){
    const tang=ball.angle+(ball.orbitDir*Math.PI/2);
    const bx=ball.x-cam.x,by=ball.y-cam.y;
    const dx=Math.cos(tang),dy=Math.sin(tang);

    // Find which node the trajectory points toward (best match)
    let bestNode=null,bestScore=Infinity;
    for(const n of nodes){
      if(n.captured||!n.visible)continue;
      const ndx=n.x-ball.x,ndy=n.y-ball.y;
      const d=Math.sqrt(ndx*ndx+ndy*ndy);
      if(d<20)continue;
      // How aligned is the trajectory with this node?
      const dot=(dx*ndx+dy*ndy)/d;
      if(dot>0.7){ // forward-ish
        // Perpendicular distance from node to trajectory line
        const perpDist=Math.abs(dx*ndy-dy*ndx);
        if(perpDist<bestScore && d<700){
          bestScore=perpDist;
          bestNode=n;
        }
      }
    }

    // Draw the line
    const tc=bestNode?(TIERS[bestNode.tier]||TIERS.medium):TIERS.medium;
    const lineColor=bestNode?tc.color.main:'#ffffff';
    const lineLen=bestNode?dist(ball.x,ball.y,bestNode.x,bestNode.y):300;

    X.save();
    X.globalAlpha=0.35+Math.sin(menuT*4)*0.1;
    X.strokeStyle=lineColor;
    X.lineWidth=2;
    X.lineCap='round';
    X.setLineDash([6,8]);
    X.lineDashOffset=-menuT*30;
    X.shadowColor=lineColor;
    X.shadowBlur=8;
    X.beginPath();
    X.moveTo(bx+dx*BALL_R,by+dy*BALL_R);
    X.lineTo(bx+dx*lineLen,by+dy*lineLen);
    X.stroke();
    X.setLineDash([]);
    X.shadowBlur=0;

    // Highlight target node
    if(bestNode){
      const nx=bestNode.x-cam.x,ny=bestNode.y-cam.y;
      X.globalAlpha=0.4+Math.sin(menuT*5)*0.2;
      X.strokeStyle=lineColor;
      X.lineWidth=2.5;
      X.shadowColor=lineColor;
      X.shadowBlur=12;
      X.beginPath();
      X.arc(nx,ny,bestNode.captureR+4,0,Math.PI*2);
      X.stroke();
      X.shadowBlur=0;
    }
    X.restore();
    X.globalAlpha=1;
  }

  // Direction arrow hint (toward nearest uncaptured node)
  if(state===ST.PLAY&&ball.orbiting){
    let closest=null,closestD=Infinity;
    for(const n of nodes){
      if(n.captured||!n.visible)continue;
      const d=dist(ball.x,ball.y,n.x,n.y);
      if(d<closestD){closestD=d;closest=n;}
    }
    // Draw small arrows toward each available node
    for(const n of nodes){
      if(n.captured||!n.visible)continue;
      const nx=n.x-cam.x,ny=n.y-cam.y;
      const bx=ball.x-cam.x,by=ball.y-cam.y;
      const ang=Math.atan2(ny-by,nx-bx);
      const arrowDist=45;
      const ax2=bx+Math.cos(ang)*arrowDist;
      const ay2=by+Math.sin(ang)*arrowDist;
      const tc=TIERS[n.tier]||TIERS.medium;
      X.globalAlpha=0.2+Math.sin(menuT*3)*0.1;
      X.strokeStyle=tc.color.main;X.lineWidth=1.5;X.lineCap='round';
      const aLen=6;
      X.beginPath();
      X.moveTo(ax2-Math.cos(ang-0.5)*aLen,ay2-Math.sin(ang-0.5)*aLen);
      X.lineTo(ax2,ay2);
      X.lineTo(ax2-Math.cos(ang+0.5)*aLen,ay2-Math.sin(ang+0.5)*aLen);
      X.stroke();
    }
    X.globalAlpha=1;
  }

  // Power-ups in world
  for(const p of powerups){
    drawPowerup(p);
  }

  // Ball trail with skin-specific effects
  drawBallTrail();
  X.globalAlpha=1;

  // Ball
  if(state!==ST.DEAD||deathT<0.08)drawBall();

  // Shield effect around ball
  if(activeShield&&state===ST.PLAY){
    const bx=ball.x-cam.x,by=ball.y-cam.y;
    X.globalAlpha=0.4+Math.sin(menuT*5)*0.2;
    X.strokeStyle='#00ffff';
    X.lineWidth=2;
    X.shadowColor='#00ffff';
    X.shadowBlur=15;
    X.beginPath();
    X.arc(bx,by,BALL_R+8+Math.sin(menuT*4)*2,0,Math.PI*2);
    X.stroke();
    // Inner ring
    X.globalAlpha=0.2;
    X.beginPath();
    X.arc(bx,by,BALL_R+4,0,Math.PI*2);
    X.stroke();
    X.shadowBlur=0;
    X.globalAlpha=1;
  }

  // Slow-mo overlay tint
  if(slowMoTimer>0&&state===ST.PLAY){
    X.globalAlpha=0.1;
    X.fillStyle='#c084fc';
    X.fillRect(-10,-10,W+20,H+20);
    X.globalAlpha=1;
  }

  // Magnet aura around ball
  if(magnetTimer>0&&state===ST.PLAY){
    const bx=ball.x-cam.x,by=ball.y-cam.y;
    X.globalAlpha=0.2+Math.sin(menuT*6)*0.1;
    X.strokeStyle='#ffd32a';
    X.lineWidth=1.5;
    X.setLineDash([4,4]);
    X.beginPath();
    X.arc(bx,by,30+Math.sin(menuT*3)*5,0,Math.PI*2);
    X.stroke();
    X.beginPath();
    X.arc(bx,by,45+Math.sin(menuT*3+1)*5,0,Math.PI*2);
    X.stroke();
    X.setLineDash([]);
    X.globalAlpha=1;
  }

  // Particles
  for(const p of particles){
    X.globalAlpha=Math.max(0,p.life);X.fillStyle=p.color;
    X.beginPath();X.arc(p.x-cam.x,p.y-cam.y,p.size*Math.max(0.2,p.life),0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // Score popups
  for(const p of scorePopups){
    X.globalAlpha=Math.min(p.life*2,1);
    X.fillStyle=p.color;
    X.font='bold 22px -apple-system, system-ui, sans-serif';
    X.textAlign='center';X.textBaseline='middle';
    X.fillText(p.text,p.x-cam.x,p.y-cam.y);
  }
  X.globalAlpha=1;

  } // end !MENU

  // Flash
  if(flashA>0){X.globalAlpha=flashA;X.fillStyle='#fff';X.fillRect(-10,-10,W+20,H+20);X.globalAlpha=1;}

  // Gold flash overlay
  if(goldFlashT>0){
    X.globalAlpha=goldFlashT*0.4;
    const gg=X.createRadialGradient(W/2,H/2,0,W/2,H/2,W);
    gg.addColorStop(0,'rgba(255,211,42,0.8)');
    gg.addColorStop(0.5,'rgba(255,170,0,0.3)');
    gg.addColorStop(1,'rgba(255,170,0,0)');
    X.fillStyle=gg;
    X.fillRect(-10,-10,W+20,H+20);
    X.globalAlpha=1;
  }

  // Reset zoom for UI
  if(z!==1){
    X.translate(W/2,H/2);X.scale(1/z,1/z);X.translate(-W/2,-H/2);
  }

  if(state===ST.PLAY){drawPlayUI();drawPauseBtn();drawMuteBtn();}
  else if(state===ST.MENU){drawMenuUI();drawMuteBtn();}
  else if(state===ST.DEAD){drawDeadUI();drawMuteBtn();}
  else if(state===ST.PAUSE){drawPlayUI();drawPauseScreen();drawMuteBtn();}

  X.restore();
}

function drawAsteroid(a,ax,ay){
  X.save();X.translate(ax,ay);X.rotate(a.rot);
  const g=X.createRadialGradient(-2,-2,0,0,0,a.r);
  g.addColorStop(0,'#5a5a6e');g.addColorStop(1,'#2a2a3e');
  X.fillStyle=g;
  X.beginPath();
  a.vertices.forEach((v,i)=>{
    const px=Math.cos(v.a)*a.r*v.r,py=Math.sin(v.a)*a.r*v.r;
    i===0?X.moveTo(px,py):X.lineTo(px,py);
  });
  X.closePath();X.fill();
  X.strokeStyle='rgba(150,150,180,0.3)';X.lineWidth=1;X.stroke();
  X.fillStyle='rgba(0,0,0,0.2)';
  X.beginPath();X.arc(a.r*0.2,-a.r*0.15,a.r*0.2,0,Math.PI*2);X.fill();
  X.restore();
}

function drawNode(n,nx,ny,idx){
  const tc=TIERS[n.tier]||TIERS.medium;
  const col=tc.color;
  const isActive=idx===ball.currentNode&&ball.orbiting;
  const isNext=!n.captured;
  const ps=Math.sin(n.pulse)*2;

  let nodeAlpha=1;
  if(n.disappearing&&!n.captured&&n.visible&&n.disappearTimer<0.8){
    nodeAlpha=0.4+Math.sin(menuT*15)*0.4;
  }

  // Teleport ring effect
  if(n.teleporting&&!n.captured){
    if(n.teleportFlash>0){
      X.globalAlpha=n.teleportFlash*0.6;
      X.strokeStyle='#ff00ff';
      X.lineWidth=2;
      X.shadowColor='#ff00ff';
      X.shadowBlur=10;
      X.beginPath();
      X.arc(nx,ny,(1-n.teleportFlash)*40+10,0,Math.PI*2);
      X.stroke();
      X.shadowBlur=0;
    }
    // Warning ring before teleport
    if(n.teleportTimer<0.6){
      X.globalAlpha=0.3+Math.sin(menuT*20)*0.3;
      X.strokeStyle='#ff00ff';
      X.lineWidth=1.5;
      X.setLineDash([3,3]);
      X.beginPath();
      X.arc(nx,ny,n.nodeR+8,0,Math.PI*2);
      X.stroke();
      X.setLineDash([]);
    }
  }

  // Capture zone
  if(isNext){
    X.globalAlpha=(0.04+Math.sin(n.pulse)*0.02)*nodeAlpha;
    X.fillStyle=col.main;
    X.beginPath();X.arc(nx,ny,n.captureR,0,Math.PI*2);X.fill();
    X.globalAlpha=0.1*nodeAlpha;
    X.strokeStyle=col.main;X.lineWidth=1;X.setLineDash([3,5]);
    X.beginPath();X.arc(nx,ny,n.captureR,0,Math.PI*2);X.stroke();
    X.setLineDash([]);
  }

  // Moving path
  if(n.moving&&!n.captured){
    X.globalAlpha=0.06;X.strokeStyle=col.main;X.lineWidth=1;X.setLineDash([2,4]);
    X.beginPath();X.arc(n.baseX-cam.x,n.baseY-cam.y,n.mRadius,0,Math.PI*2);X.stroke();
    X.setLineDash([]);
  }

  // Orbit ring
  if(isActive){
    X.globalAlpha=0.2;X.strokeStyle='#ffffff';X.lineWidth=1;X.setLineDash([3,6]);
    X.beginPath();X.arc(nx,ny,ball.orbitRadius,0,Math.PI*2);X.stroke();
    X.setLineDash([]);
  }

  // Body
  X.globalAlpha=nodeAlpha;
  const r=n.nodeR+ps;
  X.shadowColor=col.glow;X.shadowBlur=isActive?20:(isNext?12:5);
  const ng=X.createRadialGradient(nx-2,ny-2,0,nx,ny,r);
  ng.addColorStop(0,col.light);ng.addColorStop(0.6,col.main);ng.addColorStop(1,col.glow);
  X.fillStyle=n.captured&&!isActive?'rgba(60,60,80,0.3)':ng;
  X.beginPath();X.arc(nx,ny,r,0,Math.PI*2);X.fill();
  X.shadowBlur=0;

  // Shine
  if(!n.captured||isActive){
    const sg=X.createRadialGradient(nx-3,ny-3,0,nx,ny,r);
    sg.addColorStop(0,'rgba(255,255,255,0.4)');sg.addColorStop(1,'rgba(255,255,255,0)');
    X.fillStyle=sg;X.beginPath();X.arc(nx,ny,r,0,Math.PI*2);X.fill();
  }

  // Points label
  if(isNext&&n.label){
    X.globalAlpha=0.8*nodeAlpha;
    X.fillStyle='#ffffff';
    X.font='bold 11px -apple-system, system-ui, sans-serif';
    X.textAlign='center';X.textBaseline='middle';
    X.fillText(n.label,nx,ny);
  }

  X.globalAlpha=1;
}

function drawBallTrail(){
  const skin=SKINS[selectedSkin]||SKINS.default;
  const trailType=skin.trail;

  // Special trails
  if(trailType==='fire'){
    // Phoenix fire trail
    for(let i=0;i<ball.trail.length;i++){
      const t=ball.trail[i];
      if(t.a<=0)continue;
      const tx=t.x-cam.x,ty=t.y-cam.y;
      const prog=i/ball.trail.length;
      X.globalAlpha=t.a*0.6;
      X.shadowColor='#ff4500';X.shadowBlur=8;
      const fg=X.createRadialGradient(tx,ty,0,tx,ty,BALL_R*t.a*0.8);
      fg.addColorStop(0,'#ffff80');
      fg.addColorStop(0.4,'#ff8000');
      fg.addColorStop(1,'rgba(255,0,0,0)');
      X.fillStyle=fg;
      X.beginPath();X.arc(tx,ty,BALL_R*t.a*0.8,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
    }
  }
  else if(trailType==='ice'){
    // Ice crystals trail
    for(let i=0;i<ball.trail.length;i++){
      const t=ball.trail[i];
      if(t.a<=0)continue;
      const tx=t.x-cam.x,ty=t.y-cam.y;
      X.globalAlpha=t.a*0.5;
      X.shadowColor='#00ffff';X.shadowBlur=6;
      X.fillStyle='#80ffff';
      // Crystal shape
      const sz=BALL_R*t.a*0.5;
      X.save();
      X.translate(tx,ty);
      X.rotate(i*0.3);
      X.beginPath();
      X.moveTo(0,-sz);X.lineTo(sz*0.6,0);X.lineTo(0,sz);X.lineTo(-sz*0.6,0);
      X.closePath();
      X.fill();
      X.restore();
      X.shadowBlur=0;
    }
  }
  else if(trailType==='gold'){
    // Golden sparkles
    for(let i=0;i<ball.trail.length;i++){
      const t=ball.trail[i];
      if(t.a<=0)continue;
      const tx=t.x-cam.x,ty=t.y-cam.y;
      X.globalAlpha=t.a*0.6;
      X.shadowColor='#ffd700';X.shadowBlur=10;
      X.fillStyle='#ffd700';
      X.beginPath();X.arc(tx,ty,BALL_R*t.a*0.5,0,Math.PI*2);X.fill();
      // Sparkle cross
      if(i%2===0){
        X.strokeStyle='rgba(255,255,200,0.8)';
        X.lineWidth=1;
        const sz=BALL_R*t.a*0.8;
        X.beginPath();
        X.moveTo(tx-sz,ty);X.lineTo(tx+sz,ty);
        X.moveTo(tx,ty-sz);X.lineTo(tx,ty+sz);
        X.stroke();
      }
      X.shadowBlur=0;
    }
  }
  else if(trailType==='metal'){
    // Metallic gleaming trail
    for(let i=0;i<ball.trail.length;i++){
      const t=ball.trail[i];
      if(t.a<=0)continue;
      const tx=t.x-cam.x,ty=t.y-cam.y;
      X.globalAlpha=t.a*0.4;
      const mg=X.createRadialGradient(tx,ty,0,tx,ty,BALL_R*t.a*0.6);
      mg.addColorStop(0,'#ffffff');
      mg.addColorStop(0.5,'#ccccdd');
      mg.addColorStop(1,'rgba(120,120,160,0)');
      X.fillStyle=mg;
      X.beginPath();X.arc(tx,ty,BALL_R*t.a*0.6,0,Math.PI*2);X.fill();
    }
  }
  else if(trailType==='ghost'){
    // Ghostly purple trail
    for(let i=0;i<ball.trail.length;i++){
      const t=ball.trail[i];
      if(t.a<=0)continue;
      const tx=t.x-cam.x,ty=t.y-cam.y;
      const wobble=Math.sin(menuT*5+i*0.5)*3;
      X.globalAlpha=t.a*0.5;
      X.shadowColor='#7a00ff';X.shadowBlur=15;
      const gg=X.createRadialGradient(tx+wobble,ty,0,tx+wobble,ty,BALL_R*t.a*0.9);
      gg.addColorStop(0,'rgba(200,100,255,0.8)');
      gg.addColorStop(1,'rgba(122,0,255,0)');
      X.fillStyle=gg;
      X.beginPath();X.arc(tx+wobble,ty,BALL_R*t.a*0.9,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
    }
  }
  else if(trailType==='hellfire'){
    // Demon hellfire - red/black
    for(let i=0;i<ball.trail.length;i++){
      const t=ball.trail[i];
      if(t.a<=0)continue;
      const tx=t.x-cam.x,ty=t.y-cam.y;
      X.globalAlpha=t.a*0.7;
      X.shadowColor='#ff0000';X.shadowBlur=12;
      const hg=X.createRadialGradient(tx,ty,0,tx,ty,BALL_R*t.a*0.8);
      hg.addColorStop(0,'#ff4400');
      hg.addColorStop(0.5,'#8b0000');
      hg.addColorStop(1,'rgba(0,0,0,0)');
      X.fillStyle=hg;
      X.beginPath();X.arc(tx,ty,BALL_R*t.a*0.8,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
    }
  }
  else if(trailType==='stars'){
    // Cosmic star trail
    for(let i=0;i<ball.trail.length;i++){
      const t=ball.trail[i];
      if(t.a<=0)continue;
      const tx=t.x-cam.x,ty=t.y-cam.y;
      X.globalAlpha=t.a*0.6;
      const colors=['#ffffff','#a0a0ff','#ff80ff','#80ffff'];
      X.fillStyle=colors[i%colors.length];
      X.shadowColor=colors[i%colors.length];
      X.shadowBlur=8;
      X.beginPath();X.arc(tx,ty,BALL_R*t.a*0.4,0,Math.PI*2);X.fill();
      // Small star points
      if(i%3===0){
        const sz=BALL_R*t.a*0.7;
        X.strokeStyle=colors[i%colors.length];
        X.lineWidth=0.8;
        X.beginPath();
        X.moveTo(tx-sz,ty);X.lineTo(tx+sz,ty);
        X.moveTo(tx,ty-sz);X.lineTo(tx,ty+sz);
        X.stroke();
      }
      X.shadowBlur=0;
    }
  }
  else {
    // Default colored trail based on skin color
    const trailColor=skin.trail||skin.color||'#ffffff';
    for(const t of ball.trail){
      if(t.a<=0)continue;
      const tx=t.x-cam.x,ty=t.y-cam.y;
      X.globalAlpha=t.a*0.35;
      X.fillStyle=trailColor;
      X.beginPath();X.arc(tx,ty,BALL_R*t.a*0.5,0,Math.PI*2);X.fill();
    }
  }
}

function drawPowerup(p){
  const px=p.x-cam.x, py=p.y-cam.y+p.bobY;
  const scale=p.life<2?p.life/2:1;

  X.save();
  X.translate(px,py);
  X.scale(scale,scale);

  let color1,color2,glow,icon;
  if(p.type==='shield'){
    color1='#80ffff';color2='#00aaff';glow='#00ffff';icon='shield';
  } else if(p.type==='slowmo'){
    color1='#e0a0ff';color2='#7000c0';glow='#c084fc';icon='clock';
  } else {
    color1='#ffe066';color2='#ff8000';glow='#ffd32a';icon='magnet';
  }

  // Outer glow ring
  X.shadowColor=glow;
  X.shadowBlur=18;
  X.globalAlpha=0.5+Math.sin(p.pulse)*0.3;
  X.strokeStyle=glow;
  X.lineWidth=2;
  X.beginPath();
  X.arc(0,0,18+Math.sin(p.pulse)*2,0,Math.PI*2);
  X.stroke();

  // Inner background circle
  X.globalAlpha=1;
  const bg=X.createRadialGradient(-3,-4,0,0,0,16);
  bg.addColorStop(0,color1);
  bg.addColorStop(1,color2);
  X.fillStyle=bg;
  X.beginPath();
  X.arc(0,0,15,0,Math.PI*2);
  X.fill();
  X.shadowBlur=0;

  // Icon
  X.fillStyle='#ffffff';
  X.strokeStyle='#ffffff';
  X.lineWidth=2;
  X.lineCap='round';
  X.lineJoin='round';

  if(icon==='shield'){
    // Shield shape
    X.beginPath();
    X.moveTo(0,-8);
    X.lineTo(7,-5);
    X.lineTo(7,2);
    X.quadraticCurveTo(7,7,0,9);
    X.quadraticCurveTo(-7,7,-7,2);
    X.lineTo(-7,-5);
    X.closePath();
    X.fill();
  } else if(icon==='clock'){
    // Clock circle
    X.beginPath();
    X.arc(0,0,7,0,Math.PI*2);
    X.stroke();
    // Hands
    X.beginPath();
    X.moveTo(0,0);X.lineTo(0,-5);
    X.moveTo(0,0);X.lineTo(4,2);
    X.stroke();
  } else if(icon==='magnet'){
    // U-shaped magnet
    X.lineWidth=3;
    X.beginPath();
    X.arc(0,0,6,Math.PI,0,false);
    X.stroke();
    X.beginPath();
    X.moveTo(-6,0);X.lineTo(-6,5);
    X.moveTo(6,0);X.lineTo(6,5);
    X.stroke();
    // Red tips
    X.fillStyle='#ff4444';
    X.fillRect(-8,4,4,3);
    X.fillRect(4,4,4,3);
  }

  // Fade out near end
  if(p.life<3){
    X.globalAlpha=Math.max(0,p.life/3);
  }

  X.restore();
  X.globalAlpha=1;
}

function drawBall(){
  const bx=ball.x-cam.x,by=ball.y-cam.y;
  drawBallAt(bx,by,ball.squash,!ball.orbiting,selectedSkin);
}

function drawBallAt(bx,by,squash,isFlying,skinKey){
  const skin=SKINS[skinKey]||SKINS.default;
  X.save();X.translate(bx,by);
  const sc=squash||1;
  X.scale(2-sc,sc);
  const r=BALL_R;
  const glowP=0.5+Math.sin(ball.glow)*0.3;
  const sr=clamp(ball.speed/500,0,1);

  const glowColor=skin.glow||skin.color;
  X.shadowColor=sr>0.5?'#6688ff':glowColor;
  X.shadowBlur=12+glowP*6+(skin.rarity==='stellar'?8:skin.rarity==='legendary'?5:0);

  // Body
  const bg=X.createRadialGradient(-2,-2,0,0,0,r);
  bg.addColorStop(0,'#ffffff');
  bg.addColorStop(0.4,skin.color);
  bg.addColorStop(1,skin.color2);
  X.fillStyle=bg;X.beginPath();X.arc(0,0,r,0,Math.PI*2);X.fill();
  X.shadowBlur=0;

  // Eyes
  X.fillStyle='#1a1a2e';
  if(isFlying){
    X.beginPath();X.ellipse(-3.5,-1,2.5,3,0,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(3.5,-1,2.5,3,0,0,Math.PI*2);X.fill();
  } else {
    X.beginPath();X.arc(-3.5,-1,2,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(3.5,-1,2,0,Math.PI*2);X.fill();
  }
  X.fillStyle='rgba(255,255,255,0.9)';
  X.beginPath();X.arc(-4,-2.5,1,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(3,-2.5,1,0,Math.PI*2);X.fill();
  if(isFlying){
    X.fillStyle='#1a1a2e';X.beginPath();X.ellipse(0,3.5,2.5,2,0,0,Math.PI*2);X.fill();
  } else {
    X.strokeStyle='#1a1a2e';X.lineWidth=1;X.lineCap='round';
    X.beginPath();X.arc(0,2,2.5,0.3,Math.PI-0.3);X.stroke();
  }

  // Accessories
  if(skin.accessory)drawAccessory(skin.accessory,skin);

  X.restore();
}

function drawAccessory(type,skin){
  X.save();
  switch(type){
    case 'tophat':
      X.fillStyle='#1a1a1a';
      X.fillRect(-7,-15,14,3);
      X.fillRect(-5,-23,10,8);
      X.fillStyle='#ff0000';
      X.fillRect(-5,-17,10,1.5);
      break;

    case 'glasses':
      X.strokeStyle='#1a1a2e';X.lineWidth=1.5;
      X.beginPath();X.arc(-3.5,-1,3.5,0,Math.PI*2);X.stroke();
      X.beginPath();X.arc(3.5,-1,3.5,0,Math.PI*2);X.stroke();
      X.beginPath();X.moveTo(0,-1);X.lineTo(0,-1);X.stroke();
      X.fillStyle='rgba(100,200,255,0.3)';
      X.beginPath();X.arc(-3.5,-1,3,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(3.5,-1,3,0,Math.PI*2);X.fill();
      break;

    case 'cap':
      X.fillStyle='#ff4757';
      X.beginPath();X.arc(0,-3,9,Math.PI,0);X.fill();
      X.fillRect(2,-4,12,2);
      X.fillStyle='#fff';
      X.font='bold 6px sans-serif';
      X.textAlign='center';
      X.fillText('O',0,-7);
      break;

    case 'crown':
      X.fillStyle='#ffd700';
      X.beginPath();
      X.moveTo(-8,-8);
      X.lineTo(-8,-13);
      X.lineTo(-5,-10);
      X.lineTo(-2,-15);
      X.lineTo(0,-10);
      X.lineTo(2,-15);
      X.lineTo(5,-10);
      X.lineTo(8,-13);
      X.lineTo(8,-8);
      X.closePath();
      X.fill();
      X.fillStyle='#ff0000';
      X.beginPath();X.arc(0,-10,1.5,0,Math.PI*2);X.fill();
      break;

    case 'flames':
      // Phoenix flames around head
      const ft=menuT*8;
      X.fillStyle='#ff4500';
      X.shadowColor='#ff8c00';X.shadowBlur=10;
      for(let i=0;i<5;i++){
        const a=-Math.PI/2+(i-2)*0.4;
        const len=8+Math.sin(ft+i)*3;
        X.beginPath();
        X.moveTo(Math.cos(a-0.15)*r,Math.sin(a-0.15)*r);
        X.quadraticCurveTo(Math.cos(a)*(r+len*0.5),Math.sin(a)*(r+len*0.5),
                           Math.cos(a)*(r+len),Math.sin(a)*(r+len));
        X.quadraticCurveTo(Math.cos(a)*(r+len*0.5),Math.sin(a)*(r+len*0.5),
                           Math.cos(a+0.15)*r,Math.sin(a+0.15)*r);
        X.closePath();
        X.fill();
      }
      X.fillStyle='#ffd700';
      for(let i=0;i<3;i++){
        const a=-Math.PI/2+(i-1)*0.4;
        const len=4+Math.sin(ft+i)*2;
        X.beginPath();
        X.arc(Math.cos(a)*(r+len*0.5),Math.sin(a)*(r+len*0.5),2,0,Math.PI*2);
        X.fill();
      }
      X.shadowBlur=0;
      break;

    case 'iceShards':
      X.fillStyle='#80ffff';
      X.shadowColor='#00ffff';X.shadowBlur=8;
      for(let i=0;i<6;i++){
        const a=(i/6)*Math.PI*2;
        const x1=Math.cos(a)*r;
        const y1=Math.sin(a)*r;
        X.beginPath();
        X.moveTo(x1-2,y1);
        X.lineTo(Math.cos(a)*(r+6),Math.sin(a)*(r+6));
        X.lineTo(x1+2,y1);
        X.closePath();
        X.fill();
      }
      X.shadowBlur=0;
      break;

    case 'royalCrown':
      X.fillStyle='#ffd700';
      X.shadowColor='#fff080';X.shadowBlur=6;
      X.beginPath();
      X.moveTo(-10,-8);
      X.lineTo(-10,-15);
      X.lineTo(-6,-11);
      X.lineTo(-3,-18);
      X.lineTo(0,-12);
      X.lineTo(3,-18);
      X.lineTo(6,-11);
      X.lineTo(10,-15);
      X.lineTo(10,-8);
      X.closePath();
      X.fill();
      // Gems
      X.fillStyle='#ff0066';
      X.beginPath();X.arc(-3,-15,1.5,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(3,-15,1.5,0,Math.PI*2);X.fill();
      X.fillStyle='#00ff88';
      X.beginPath();X.arc(0,-13,1.5,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
      break;

    case 'helmet':
      // Medieval knight helmet
      X.fillStyle='#a0a0c0';
      X.shadowColor='#fff';X.shadowBlur=4;
      X.beginPath();
      X.arc(0,-4,r+2,Math.PI,Math.PI*2);
      X.lineTo(r+2,3);
      X.lineTo(-r-2,3);
      X.closePath();
      X.fill();
      // Visor slit
      X.fillStyle='#000';
      X.fillRect(-7,-3,14,2);
      // Top crest
      X.fillStyle='#ff0000';
      X.beginPath();
      X.moveTo(-2,-r-4);
      X.lineTo(0,-r-10);
      X.lineTo(2,-r-4);
      X.closePath();
      X.fill();
      X.shadowBlur=0;
      break;

    case 'skull':
      // Skull mask
      X.fillStyle='#f0f0f0';
      X.shadowColor='#7a00ff';X.shadowBlur=10;
      X.beginPath();
      X.arc(0,-2,r-1,0,Math.PI*2);
      X.fill();
      X.shadowBlur=0;
      // Eye sockets glowing
      X.fillStyle='#7a00ff';
      X.shadowColor='#7a00ff';X.shadowBlur=8;
      X.beginPath();X.arc(-3.5,-2,2.5,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(3.5,-2,2.5,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
      // Nose
      X.fillStyle='#000';
      X.beginPath();
      X.moveTo(0,1);X.lineTo(-1,3);X.lineTo(1,3);X.closePath();
      X.fill();
      // Teeth
      X.fillStyle='#000';
      X.fillRect(-4,4,8,1);
      for(let i=-3;i<=3;i+=2){
        X.fillRect(i,4,1,2);
      }
      break;

    case 'horns':
      // Demon horns
      X.fillStyle='#1a0000';
      X.shadowColor='#ff0000';X.shadowBlur=8;
      X.beginPath();
      X.moveTo(-6,-6);
      X.quadraticCurveTo(-12,-12,-9,-16);
      X.quadraticCurveTo(-7,-14,-4,-7);
      X.closePath();
      X.fill();
      X.beginPath();
      X.moveTo(6,-6);
      X.quadraticCurveTo(12,-12,9,-16);
      X.quadraticCurveTo(7,-14,4,-7);
      X.closePath();
      X.fill();
      X.shadowBlur=0;
      // Glow eyes red
      X.fillStyle='#ff0000';
      X.shadowColor='#ff0000';X.shadowBlur=6;
      X.beginPath();X.arc(-3.5,-1,1.5,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(3.5,-1,1.5,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
      break;

    case 'galaxy':
      // Galaxy swirl around ball
      const gt=menuT*1.5;
      X.shadowColor='#a0a0ff';X.shadowBlur=10;
      for(let i=0;i<12;i++){
        const a=gt+(i/12)*Math.PI*2;
        const dist=r+3+Math.sin(gt*2+i)*2;
        X.fillStyle=i%3===0?'#ffffff':(i%3===1?'#a0a0ff':'#ff80ff');
        X.beginPath();
        X.arc(Math.cos(a)*dist,Math.sin(a)*dist,1.5,0,Math.PI*2);
        X.fill();
      }
      // Inner ring
      X.strokeStyle='rgba(160,160,255,0.4)';
      X.lineWidth=1;
      X.beginPath();
      X.ellipse(0,0,r+5,r+2,gt*0.5,0,Math.PI*2);
      X.stroke();
      X.shadowBlur=0;
      break;
  }
  X.restore();
}

function getRarityColor(rarity){
  switch(rarity){
    case 'common':return '#a0a0a0';
    case 'rare':return '#4d9eff';
    case 'legendary':return '#c084fc';
    case 'stellar':return '#ffd700';
  }
  return '#fff';
}

function getRarityName(rarity){
  switch(rarity){
    case 'common':return 'COMUM';
    case 'rare':return 'RARO';
    case 'legendary':return 'LENDÁRIO';
    case 'stellar':return 'ESTELAR';
  }
  return '';
}

function getMedal(s){
  if(s>=200)return{name:'DIAMANTE',color:'#b9f6ff',glow:'#00d4ff',icon:'◆'};
  if(s>=100)return{name:'OURO',color:'#ffd32a',glow:'#ffaa00',icon:'★'};
  if(s>=50)return{name:'PRATA',color:'#e0e0e8',glow:'#a0a0b0',icon:'★'};

}

function drawMedal(x,y,medal,scale){
  if(!medal)return;
  scale=scale||1;
  X.save();
  X.translate(x,y);
  X.scale(scale,scale);

  // Glow background
  X.shadowColor=medal.glow;
  X.shadowBlur=20;

  // Outer ring
  const grad=X.createRadialGradient(0,-3,0,0,0,28);
  grad.addColorStop(0,medal.color);
  grad.addColorStop(0.7,medal.color);
  grad.addColorStop(1,medal.glow);
  X.fillStyle=grad;
  X.beginPath();
  X.arc(0,0,28,0,Math.PI*2);
  X.fill();
  X.shadowBlur=0;

  // Inner shine
  const sh=X.createRadialGradient(-6,-8,0,0,0,28);
  sh.addColorStop(0,'rgba(255,255,255,0.6)');
  sh.addColorStop(0.5,'rgba(255,255,255,0.1)');
  sh.addColorStop(1,'rgba(255,255,255,0)');
  X.fillStyle=sh;
  X.beginPath();
  X.arc(0,0,28,0,Math.PI*2);
  X.fill();

  // Border
  X.strokeStyle='rgba(0,0,0,0.3)';
  X.lineWidth=2;
  X.beginPath();
  X.arc(0,0,28,0,Math.PI*2);
  X.stroke();

  // Icon
  X.fillStyle='rgba(0,0,0,0.5)';
  X.font='bold 28px -apple-system, system-ui, sans-serif';
  X.textAlign='center';
  X.textBaseline='middle';
  X.fillText(medal.icon,0,2);

  X.restore();
}

function drawMuteBtn(){
  const s=MUTE_BTN.size, m=MUTE_BTN.margin;
  const bx=W-m-PAUSE_BTN.size-8-s, by=m;

  // Background circle
  X.globalAlpha=0.3;
  X.fillStyle='#000';
  X.beginPath();X.arc(bx+s/2,by+s/2,s/2,0,Math.PI*2);X.fill();
  X.globalAlpha=0.4;
  X.strokeStyle='#ffffff';
  X.lineWidth=1.5;
  X.beginPath();X.arc(bx+s/2,by+s/2,s/2,0,Math.PI*2);X.stroke();

  // Speaker icon
  X.globalAlpha=0.85;
  X.fillStyle='#ffffff';
  X.strokeStyle='#ffffff';
  X.lineWidth=2;
  X.lineCap='round';
  const cx=bx+s/2, cy=by+s/2;

  // Speaker body
  X.beginPath();
  X.moveTo(cx-7,cy-3);
  X.lineTo(cx-2,cy-3);
  X.lineTo(cx+3,cy-7);
  X.lineTo(cx+3,cy+7);
  X.lineTo(cx-2,cy+3);
  X.lineTo(cx-7,cy+3);
  X.closePath();
  X.fill();

  if(muted){
    // X mark
    X.strokeStyle='#ff6b6b';
    X.beginPath();
    X.moveTo(cx+6,cy-5);
    X.lineTo(cx+12,cy+5);
    X.moveTo(cx+12,cy-5);
    X.lineTo(cx+6,cy+5);
    X.stroke();
  } else {
    // Sound waves
    X.beginPath();
    X.arc(cx+3,cy,5,-Math.PI/4,Math.PI/4);
    X.stroke();
    X.beginPath();
    X.arc(cx+3,cy,9,-Math.PI/4,Math.PI/4);
    X.stroke();
  }
  X.globalAlpha=1;
}

  if(phaseMsgT>0){

    X.globalAlpha=f;X.fillStyle='#ffd32a';

    X.textBaseline='middle';
    X.fillText('FASE '+getPhase()+': '+phaseMsg,W/2,H*0.18);

  let puY = 130;

  }

function drawPuTimer(x,y,icon,color,progress){
  const size=34;
  X.save();

  // Background
  X.globalAlpha=0.7;
  X.fillStyle='rgba(0,0,0,0.6)';
  X.beginPath();
  X.arc(x+size/2,y+size/2,size/2,0,Math.PI*2);
  X.fill();

  // Progress arc
  X.globalAlpha=0.9;
  X.strokeStyle=color;
  X.lineWidth=2.5;
  X.shadowColor=color;
  X.shadowBlur=8;
  X.beginPath();
  X.arc(x+size/2,y+size/2,size/2-2,-Math.PI/2,-Math.PI/2+Math.PI*2*progress);
  X.stroke();
  X.shadowBlur=0;

  // Icon centered
  X.globalAlpha=1;
  X.translate(x+size/2,y+size/2);
  X.scale(0.7,0.7);
  X.fillStyle='#ffffff';
  X.strokeStyle='#ffffff';
  X.lineWidth=2;
  X.lineCap='round';
  X.lineJoin='round';

  if(icon==='shield'){
    X.beginPath();
    X.moveTo(0,-8);
    X.lineTo(7,-5);
    X.lineTo(7,2);
    X.quadraticCurveTo(7,7,0,9);
    X.quadraticCurveTo(-7,7,-7,2);
    X.lineTo(-7,-5);
    X.closePath();
    X.fill();
  } else if(icon==='clock'){
    X.beginPath();
    X.arc(0,0,7,0,Math.PI*2);
    X.stroke();
    X.beginPath();
    X.moveTo(0,0);X.lineTo(0,-5);
    X.moveTo(0,0);X.lineTo(4,2);
    X.stroke();
  } else if(icon==='magnet'){
    X.lineWidth=3;
    X.beginPath();
    X.arc(0,0,6,Math.PI,0,false);
    X.stroke();
    X.beginPath();
    X.moveTo(-6,0);X.lineTo(-6,5);
    X.moveTo(6,0);X.lineTo(6,5);
    X.stroke();
    X.fillStyle='#ff4444';
    X.fillRect(-8,4,4,3);
    X.fillRect(4,4,4,3);
  }

  X.restore();
}

function roundRect(x,y,w,h,r){
  X.beginPath();
  X.moveTo(x+r,y);
  X.lineTo(x+w-r,y);
  X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r);
  X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h);
  X.quadraticCurveTo(x,y+h,x,y+h-r);
  X.lineTo(x,y+r);
  X.quadraticCurveTo(x,y,x+r,y);
  X.closePath();
}

function drawSkinsMenu(){
  X.textAlign='center';X.textBaseline='middle';

  // Title
  X.fillStyle='#e0e0ff';X.font='bold 30px -apple-system, system-ui, sans-serif';
  X.shadowColor='#b0b0ff';X.shadowBlur=15;
  X.fillText('SKINS',W/2,H*0.06);
  X.shadowBlur=0;

  // Counter
  X.fillStyle='rgba(255,255,255,0.5)';
  X.font='12px -apple-system, system-ui, sans-serif';
  const totalSkins=Object.keys(SKINS).length;
  X.fillText(unlockedSkins.length+' / '+totalSkins+' DESBLOQUEADAS',W/2,H*0.06+22);

  // Back button
  drawBackBtn();

  // Group skins by rarity
  const rarities=['common','rare','legendary','stellar'];
  const skinsByRarity={common:[],rare:[],legendary:[],stellar:[]};
  for(const k in SKINS){
    skinsByRarity[SKINS[k].rarity].push(k);
  }

  // Grid
  const itemSize=70;
  const gap=12;
  const cols=Math.floor((W-40)/(itemSize+gap));
  let curY=H*0.13;

  for(const rarity of rarities){
    const skins=skinsByRarity[rarity];
    if(skins.length===0)continue;

    // Rarity header
    X.fillStyle=getRarityColor(rarity);
    X.font='bold 13px -apple-system, system-ui, sans-serif';
    X.textAlign='left';
    X.shadowColor=getRarityColor(rarity);
    X.shadowBlur=8;
    X.fillText(getRarityName(rarity),20,curY);
    X.shadowBlur=0;
    curY+=22;

    // Items
    let col=0;
    const startX=(W-(cols*(itemSize+gap)-gap))/2;
    for(const skinKey of skins){
      const skin=SKINS[skinKey];
      const ix=startX+col*(itemSize+gap);
      const iy=curY;
      const isUnlocked=unlockedSkins.includes(skinKey);
      const isSelected=selectedSkin===skinKey;

      // Background
      X.globalAlpha=isUnlocked?0.6:0.3;
      X.fillStyle='#000';
      roundRect(ix,iy,itemSize,itemSize,10);
      X.fill();

      // Border
      X.globalAlpha=1;
      X.strokeStyle=isSelected?'#ffd32a':getRarityColor(rarity);
      X.lineWidth=isSelected?3:1.5;
      if(isSelected){
        X.shadowColor='#ffd32a';X.shadowBlur=12;
      }
      roundRect(ix,iy,itemSize,itemSize,10);
      X.stroke();
      X.shadowBlur=0;

      if(isUnlocked){
        // Draw mini ball
        X.save();
        const cx=ix+itemSize/2,cy=iy+itemSize/2-4;
        drawBallAt(cx,cy,1,false,skinKey);
        X.restore();

        // Name
        X.fillStyle='#fff';
        X.font='bold 9px -apple-system, system-ui, sans-serif';
        X.textAlign='center';
        X.fillText(skin.name,ix+itemSize/2,iy+itemSize-8);

        menuBtnAreas.push({
          x:ix,y:iy,w:itemSize,h:itemSize,
          action:()=>{selectedSkin=skinKey;saveData();}
        });
      } else {
        // Lock icon
        X.fillStyle='rgba(255,255,255,0.3)';
        X.font='24px sans-serif';
        X.textAlign='center';
        X.fillText('🔒',ix+itemSize/2,iy+itemSize/2-4);

      col++;

function drawMiniBg(type,x,y,w,h){
  // Simplified versions of each background for previews
  if(type==='stars'){
    X.fillStyle='#0a0a1a';X.fillRect(x,y,w,h);
    for(let i=0;i<20;i++){
      const sx=x+(i*47)%w, sy=y+(i*73)%h;
      X.fillStyle='#fff';X.globalAlpha=0.5;
      X.fillRect(sx,sy,1,1);
    }
    X.globalAlpha=1;
  }
  else if(type==='nebula'){
    X.fillStyle='#0a0518';X.fillRect(x,y,w,h);
    const g=X.createRadialGradient(x+w*0.3,y+h*0.5,0,x+w*0.3,y+h*0.5,w*0.6);
    g.addColorStop(0,'rgba(150,50,200,0.6)');g.addColorStop(1,'rgba(150,50,200,0)');
    X.fillStyle=g;X.fillRect(x,y,w,h);
    const g2=X.createRadialGradient(x+w*0.7,y+h*0.5,0,x+w*0.7,y+h*0.5,w*0.5);
    g2.addColorStop(0,'rgba(50,100,200,0.5)');g2.addColorStop(1,'rgba(50,100,200,0)');
    X.fillStyle=g2;X.fillRect(x,y,w,h);
  }
  else if(type==='galaxy'){
    X.fillStyle='#040418';X.fillRect(x,y,w,h);
    const cx=x+w/2,cy=y+h/2;
    for(let i=0;i<3;i++){
      for(let j=0;j<25;j++){
        const a=i*Math.PI*2/3+j*0.2;
        const d=j*3;
        const px=cx+Math.cos(a)*d,py=cy+Math.sin(a)*d*0.5;
        X.fillStyle=j<8?'#fff080':'#a080ff';
        X.globalAlpha=0.6-j*0.02;
        X.fillRect(px,py,1.5,1.5);
      }
    }
    X.globalAlpha=1;
  }
  else if(type==='blackhole'){
    X.fillStyle='#000005';X.fillRect(x,y,w,h);
    const cx=x+w/2,cy=y+h/2;
    for(let i=0;i<25;i++){
      const a=i*0.4;
      const r=20+i;
      X.fillStyle=`hsla(${20+i*5},90%,60%,0.4)`;
      X.fillRect(cx+Math.cos(a)*r,cy+Math.sin(a)*r*0.3,2,2);
    }
    X.fillStyle='#000';
    X.beginPath();X.arc(cx,cy,15,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(255,180,80,0.8)';X.lineWidth=2;
    X.beginPath();X.arc(cx,cy,17,0,Math.PI*2);X.stroke();
  }
  else if(type==='redgiant'){
    X.fillStyle='#1a0008';X.fillRect(x,y,w,h);
    const cx=x+w*0.7,cy=y+h*0.3;
    const ag=X.createRadialGradient(cx,cy,0,cx,cy,w*0.6);
    ag.addColorStop(0,'rgba(255,80,40,0.6)');
    ag.addColorStop(1,'rgba(100,0,0,0)');
    X.fillStyle=ag;X.fillRect(x,y,w,h);
    const sg=X.createRadialGradient(cx,cy,0,cx,cy,30);
    sg.addColorStop(0,'#ffff80');sg.addColorStop(0.5,'#ff8000');sg.addColorStop(1,'#cc2200');
    X.fillStyle=sg;
    X.beginPath();X.arc(cx,cy,30,0,Math.PI*2);X.fill();
  }
  else if(type==='cosmic'){
    X.fillStyle='#02020a';X.fillRect(x,y,w,h);
    const ng=X.createRadialGradient(x+w*0.3,y+h*0.4,0,x+w*0.3,y+h*0.4,w*0.6);
    ng.addColorStop(0,'rgba(100,50,200,0.6)');ng.addColorStop(1,'rgba(100,50,200,0)');
    X.fillStyle=ng;X.fillRect(x,y,w,h);
    const ng2=X.createRadialGradient(x+w*0.7,y+h*0.6,0,x+w*0.7,y+h*0.6,w*0.5);
    ng2.addColorStop(0,'rgba(0,150,200,0.5)');ng2.addColorStop(1,'rgba(0,150,200,0)');
    X.fillStyle=ng2;X.fillRect(x,y,w,h);
    for(let i=0;i<8;i++){
      const sx=x+(i*53)%w,sy=y+(i*37)%h;
      X.fillStyle='#fff';
      X.fillRect(sx,sy,2,2);
    }
  }
}

        nameInputActive=false;
        nameInputBuffer='';
        saveData();
        // Submit current best if exists
        if(best>=5){
          lastSubmittedScore=best;
          submitScore(playerName,best,selectedSkin);
        }
        menuScreen='ranking';
        loadRankings();
      }
    });
  }

  // Virtual keyboard
  drawVirtualKeyboard();
}

function drawVirtualKeyboard(){
  const keys=[
    'QWERTYUIOP',
    'ASDFGHJKL',
    'ZXCVBNM⌫'
  ];
  const startY=H*0.72;
  const keyW=Math.min(W*0.085,32);
  const keyH=36;
  const gap=4;

  for(let r=0;r<keys.length;r++){
    const row=keys[r];
    const rowW=row.length*(keyW+gap)-gap;
    const rowX=(W-rowW)/2;
    const ky=startY+r*(keyH+gap);

    for(let c=0;c<row.length;c++){
      const ch=row[c];
      const kx=rowX+c*(keyW+gap);

      X.globalAlpha=0.8;
      X.fillStyle='rgba(40,40,60,0.9)';
      roundRect(kx,ky,keyW,keyH,6);
      X.fill();
      X.strokeStyle='rgba(255,255,255,0.3)';
      X.lineWidth=1;
      roundRect(kx,ky,keyW,keyH,6);
      X.stroke();
      X.globalAlpha=1;

      X.fillStyle='#fff';
      X.font='bold 14px -apple-system, system-ui, sans-serif';
      X.textAlign='center';
      X.textBaseline='middle';
      X.fillText(ch,kx+keyW/2,ky+keyH/2);

      menuBtnAreas.push({
        x:kx,y:ky,w:keyW,h:keyH,
        action:()=>{
          if(ch==='⌫'){
            nameInputBuffer=nameInputBuffer.slice(0,-1);
          } else if(nameInputBuffer.length<16){
            nameInputBuffer+=ch;
          }
        }
      });
    }
  }

  // Space bar
  const spY=startY+3*(keyH+gap);
  const spW=Math.min(W*0.5,200);
  const spX=(W-spW)/2;
  X.globalAlpha=0.8;
  X.fillStyle='rgba(40,40,60,0.9)';
  roundRect(spX,spY,spW,keyH,6);
  X.fill();
  X.strokeStyle='rgba(255,255,255,0.3)';
  X.lineWidth=1;
  roundRect(spX,spY,spW,keyH,6);
  X.stroke();
  X.fillStyle='rgba(255,255,255,0.6)';
  X.font='10px -apple-system, system-ui, sans-serif';
  X.textAlign='center';
  X.textBaseline='middle';
  X.fillText('ESPAÇO',spX+spW/2,spY+keyH/2);
  X.globalAlpha=1;
  menuBtnAreas.push({
    x:spX,y:spY,w:spW,h:keyH,
    action:()=>{
      if(nameInputBuffer.length<16 && nameInputBuffer.length>0){
        nameInputBuffer+=' ';
      }
    }
  });
}

function drawDeadUI(){
  menuBtnAreas = [];
  const oa=Math.min(deathT*2.5,0.7);
  X.globalAlpha=oa;X.fillStyle='#000';X.fillRect(-10,-10,W+20,H+20);X.globalAlpha=1;
  if(deathT<0.25)return;
  const f=Math.min((deathT-0.25)*3,1);
  X.globalAlpha=f;X.textAlign='center';X.textBaseline='middle';

  X.fillStyle='#ff6b6b';X.font='bold 36px -apple-system, system-ui, sans-serif';
  X.fillText('PERDIDO NO',W/2,H*0.13);
  X.fillText('ESPAÇO',W/2,H*0.185);

  // Medal
  const medal=getMedal(score);
  if(medal&&deathT>0.4){
    const ms=Math.min((deathT-0.4)*4,1);
    const popScale=1+Math.sin(Math.min(ms*Math.PI,Math.PI))*0.3;
    X.globalAlpha=f*ms;
    drawMedal(W/2,H*0.28,medal,popScale*1.1);

    X.fillStyle=medal.color;
    X.font='bold 14px -apple-system, system-ui, sans-serif';
    X.shadowColor=medal.glow;
    X.shadowBlur=10;
    X.fillText(medal.name,W/2,H*0.36);
    X.shadowBlur=0;
    X.globalAlpha=f;
  }

  // Stats
  X.fillStyle='rgba(255,255,255,0.4)';X.font='12px -apple-system, system-ui, sans-serif';
  X.fillText('FASE '+getPhase(),W/2,H*0.42);

  X.fillStyle='#fff';X.font='13px -apple-system, system-ui, sans-serif';
  X.fillText('PONTUAÇÃO',W/2,H*0.47);
  X.font='bold 56px -apple-system, system-ui, sans-serif';
  X.shadowColor='#b0b0ff';X.shadowBlur=15;
  X.fillText(score,W/2,H*0.535);X.shadowBlur=0;

  X.fillStyle='rgba(255,255,255,0.4)';X.font='14px -apple-system, system-ui, sans-serif';
  X.fillText('RECORDE: '+best,W/2,H*0.61);

  // Combo info
  if(maxCombo>=3){
    X.fillStyle='#00f5d4';X.font='12px -apple-system, system-ui, sans-serif';
    X.fillText('MELHOR COMBO: x'+maxCombo,W/2,H*0.66);
  }

  // Next medal hint
  const nextThresholds=[20,50,100,200];
  const nextT=nextThresholds.find(t=>t>score);
  if(nextT){
    const nm=getMedal(nextT);
    X.fillStyle='rgba(255,255,255,0.35)';
    X.font='11px -apple-system, system-ui, sans-serif';
    X.fillText('Próxima medalha: '+nm.name+' em '+nextT+' pts',W/2,H*0.71);
  }

  if(newRec){
    const nrp=0.7+Math.sin(menuT*5)*0.3;
    X.globalAlpha=f*nrp;X.fillStyle='#ffd32a';
    X.font='bold 20px -apple-system, system-ui, sans-serif';
    X.fillText('⭐ NOVO RECORDE! ⭐',W/2,H*0.745);
    X.globalAlpha=f;
  }

  // Unlock notification
  if(pendingUnlocks.length>0 && deathT>0.8){
    const u=pendingUnlocks[0];
    const up=Math.min((deathT-0.8)*3,1);
    const pulse=0.85+Math.sin(menuT*4)*0.15;

    // Background banner
    X.globalAlpha=f*up*0.9;
    const bw=Math.min(W*0.85,320);
    const bh=90;
    const bx=(W-bw)/2;
    const by=H*0.735;

    let rColor='#00f5d4';
    if(u.type==='skin'){
      rColor=getRarityColor(u.data.rarity);
    } else if(u.type==='achievement'){
      rColor='#ffd32a';
    } else {
      rColor='#70a1ff';
    }

    const bg2=X.createLinearGradient(bx,by,bx,by+bh);
    bg2.addColorStop(0,'rgba(0,0,0,0.85)');
    bg2.addColorStop(1,'rgba(0,0,0,0.95)');
    X.fillStyle=bg2;
    roundRect(bx,by,bw,bh,12);
    X.fill();

    X.strokeStyle=rColor;
    X.lineWidth=2.5;
    X.shadowColor=rColor;
    X.shadowBlur=15*pulse;
    roundRect(bx,by,bw,bh,12);
    X.stroke();
    X.shadowBlur=0;
    X.globalAlpha=f*up;

    // Icon preview
    if(u.type==='skin'){
      X.save();
      drawBallAt(bx+30,by+bh/2,1,false,u.key);
      X.restore();
    } else if(u.type==='achievement'){
      X.fillStyle=rColor;
      X.font='32px sans-serif';
      X.textAlign='center';
      X.textBaseline='middle';
      X.fillText(u.data.icon,bx+30,by+bh/2);
    } else {
      X.save();
      X.beginPath();
      X.arc(bx+30,by+bh/2,18,0,Math.PI*2);
      X.clip();
      drawMiniBg(u.data.type,bx+12,by+bh/2-18,36,36);
      X.restore();
    }

    // Text
    X.textAlign='left';X.textBaseline='middle';
    X.fillStyle=rColor;
    X.font='bold 11px -apple-system, system-ui, sans-serif';
    let label='🎉 DESBLOQUEADO!';
    if(u.type==='achievement')label='🏆 CONQUISTA!';
    X.fillText(label,bx+58,by+20);

    X.fillStyle='#fff';
    X.font='bold 18px -apple-system, system-ui, sans-serif';
    X.fillText(u.data.name.toUpperCase(),bx+58,by+40);

    if(u.type==='skin'){
      X.fillStyle=rColor;
      X.font='bold 10px -apple-system, system-ui, sans-serif';
      X.fillText(getRarityName(u.data.rarity),bx+58,by+58);
    } else if(u.type==='achievement'){
      X.fillStyle='rgba(255,255,255,0.7)';
      X.font='10px -apple-system, system-ui, sans-serif';
      X.fillText(u.data.desc,bx+58,by+58);
    } else {
      X.fillStyle='#70a1ff';
      X.font='bold 10px -apple-system, system-ui, sans-serif';
      X.fillText('NOVO FUNDO',bx+58,by+58);
    }

    X.fillStyle='rgba(255,255,255,0.5)';
    X.font='10px -apple-system, system-ui, sans-serif';
    if(u.type==='achievement'){
      X.fillText('Veja em estatísticas',bx+58,by+74);
    } else {
      X.fillText('Equipe no menu principal',bx+58,by+74);
    }

    // Count badge if multiple
    if(pendingUnlocks.length>1){
      X.fillStyle='#ffd32a';
      X.font='bold 14px -apple-system, system-ui, sans-serif';
      X.textAlign='right';
      X.fillText('+'+(pendingUnlocks.length-1),bx+bw-12,by+20);
    }

    X.textAlign='center';X.textBaseline='middle';
  }
  X.globalAlpha=f;

  // Action buttons (after small delay)
  if(deathT>0.6){
    X.globalAlpha=f;
    const btnW=Math.min(W*0.7,260);
    const btnH=44;
    const btnX=(W-btnW)/2;
    const hasUnlock = pendingUnlocks.length>0;
    const btnY1 = hasUnlock ? H*0.86 : H*0.79;

    drawActionBtn(btnX,btnY1,btnW,btnH,'JOGAR DE NOVO','#00f5d4',true,()=>{
      pendingUnlocks=[];
      reset();state=ST.PLAY;totalGames++;setMusicVolume(zenMode?0.10:0.12);
    });

    if(!hasUnlock){
      drawActionBtn(btnX,btnY1+btnH+8,btnW,btnH,'MENU PRINCIPAL','#ff6b9d',false,()=>{
        pendingUnlocks=[];
        zenMode=false;
        state=ST.MENU;
        menuScreen='main';
        setMusicVolume(0.08);
      });
    } else {
      // Smaller menu btn alongside
      drawActionBtn(btnX,btnY1+btnH+6,btnW,36,'IR AO MENU','#ff6b9d',false,()=>{
        pendingUnlocks=[];
        zenMode=false;
        state=ST.MENU;
        menuScreen='main';
        setMusicVolume(0.08);
      });
    }
  }
  X.globalAlpha=1;
}

// ============ LOOP ============
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;
  update(dt);draw();requestAnimationFrame(loop);
}
reset();
requestAnimationFrame(ts=>{lastT=ts;loop(ts);});
</script>
